# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - Shibji-Student-Per

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: studentdocker.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_27C82262C0454986A9215A531BCEE310 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_964687FDCDE14AAEA8B2693E31B2490C }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: studentdocker.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_27C82262C0454986A9215A531BCEE310 }}/predictor:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Shibji-Student-Per'
          slot-name: 'Production'
          images: 'studentdocker.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_27C82262C0454986A9215A531BCEE310 }}/predictor:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C8445C96B5884E228780E57BAA35560A }}