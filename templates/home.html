<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="py-10 px-4 font-sans text-gray-800 flex items-center justify-center">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 p-8 text-center text-white relative">
            <a href="/" class="absolute left-6 top-6 text-blue-200 hover:text-white transition font-semibold text-sm">
                ← Back to Home
            </a>
            
            <h1 class="text-3xl md:text-4xl font-extrabold mb-2 mt-4">Student Exam Performance Prediction</h1>
            <p class="text-blue-100 text-sm md:text-base">Enter the student's details below to predict their math score.</p>
        </div>

        <div class="p-8 md:p-10">
            <form action="{{ url_for('predict_datapoint')}}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Gender</label>
                        <select name="gender" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="" disabled selected>Select your Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Race or Ethnicity</label>
                        <select name="ethnicity" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="" disabled selected>Select Ethnicity</option>
                            <option value="group A">Group A</option>
                            <option value="group B">Group B</option>
                            <option value="group C">Group C</option>
                            <option value="group D">Group D</option>
                            <option value="group E">Group E</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Parental Level of Education</label>
                        <select name="parental_level_of_education" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="" disabled selected>Select Parent Education</option>
                            <option value="associate's degree">Associate's Degree</option>
                            <option value="bachelor's degree">Bachelor's Degree</option>
                            <option value="high school">High School</option>
                            <option value="master's degree">Master's Degree</option>
                            <option value="some college">Some College</option>
                            <option value="some high school">Some High School</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Lunch Type</label>
                        <select name="lunch" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="" disabled selected>Select Lunch Type</option>
                            <option value="free/reduced">Free/Reduced</option>
                            <option value="standard">Standard</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Test Preparation Course</label>
                        <select name="test_preparation_course" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            <option value="" disabled selected>Select Course Status</option>
                            <option value="none">None</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Reading Score (0-100)</label>
                        <input type="number" name="reading_score" required min="0" max="100" placeholder="Enter Reading Score" 
                               class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition" />
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Writing Score (0-100)</label>
                        <input type="number" name="writing_score" required min="0" max="100" placeholder="Enter Writing Score" 
                               class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition" />
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-indigo-700 hover:shadow-lg transition duration-200">
                        Predict Maths Score
                    </button>
                </div>
            </form>

            {% if results %}
            <div class="mt-10 p-8 bg-green-50 border-2 border-green-200 rounded-2xl text-center shadow-inner">
                <h3 class="text-xl text-green-800 font-semibold mb-2">Predicted Maths Score</h3>
                <p class="text-6xl font-extrabold text-green-600">{{ results }}</p>
            </div>
            {% endif %}
            
        </div>
    </div>

</body>
</html>
